name: Deploy MF Engine

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: mf-engine
  EC2_HOST: 13.206.50.251

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --platform linux/amd64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            ECR=765425735663.dkr.ecr.ap-south-1.amazonaws.com
            IMAGE=$ECR/mf-engine:latest

            # Login to ECR
            aws ecr get-login-password --region ap-south-1 | \
              docker login --username AWS --password-stdin $ECR

            # Pull latest image
            docker pull $IMAGE

            # Tag current image as rollback target (if container exists)
            if docker inspect mf-engine > /dev/null 2>&1; then
              CURRENT_IMAGE=$(docker inspect --format='{{.Config.Image}}' mf-engine)
              docker tag $CURRENT_IMAGE $ECR/mf-engine:rollback 2>/dev/null || true
            fi

            # Stop and remove old container
            docker stop mf-engine || true
            docker rm mf-engine || true

            # Run new container
            docker run -d \
              --name mf-engine \
              --restart always \
              -p 8080:3000 \
              --env-file /home/ec2-user/mf-engine.env \
              $IMAGE

            # Wait for container to become healthy (up to 60s)
            echo "Waiting for container health check..."
            HEALTHY=false
            for i in $(seq 1 12); do
              sleep 5
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' mf-engine 2>/dev/null || echo "no-health")
              RUNNING=$(docker inspect --format='{{.State.Running}}' mf-engine 2>/dev/null || echo "false")
              echo "  Check $i/12: running=$RUNNING health=$STATUS"
              if [ "$RUNNING" = "false" ]; then
                echo "ERROR: Container crashed! Logs:"
                docker logs mf-engine --tail 40
                # Rollback to previous image
                if docker image inspect $ECR/mf-engine:rollback > /dev/null 2>&1; then
                  echo "Rolling back to previous image..."
                  docker rm mf-engine || true
                  docker run -d --name mf-engine --restart always -p 8080:3000 \
                    --env-file /home/ec2-user/mf-engine.env $ECR/mf-engine:rollback
                fi
                exit 1
              fi
              if [ "$STATUS" = "healthy" ]; then
                HEALTHY=true
                break
              fi
            done

            if [ "$HEALTHY" = "false" ]; then
              echo "WARNING: Container running but health check not passing after 60s"
              echo "Container logs:"
              docker logs mf-engine --tail 20
            else
              echo "Container is healthy!"
            fi

            # Clean up old images (keep rollback)
            docker image prune -f
